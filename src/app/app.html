<div class="app-shell">
  <header class="app-card sticky top-4 z-20 mb-6 px-5 py-4 sm:px-6">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
      <div class="max-w-3xl">
        <p class="font-mono text-xs uppercase tracking-[0.32em] text-sky-600">
          MSCS Final Year Project
        </p>
        <h1 class="mt-2 text-2xl font-semibold tracking-tight text-slate-950 sm:text-3xl">
          Explainable Multimodal Fake News Detection
        </h1>
        <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-600 sm:text-base">
          Angular frontend foundation for real-time text and image credibility analysis with
          explainable AI workflows.
        </p>
      </div>

      <nav class="flex flex-wrap items-center gap-2" aria-label="Primary">
        @for (item of navigationItems; track item.path) {
          <a
            [routerLink]="item.path"
            [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
            routerLinkActive="nav-pill-active"
            class="nav-pill"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet />
  </main>
</div>
